global:
  resolve_timeout: 5m
  smtp_from: "alerts@bridge.local"
  smtp_smarthost: "smtp.example.com:587"
  smtp_auth_username: "alerts@bridge.local"
  smtp_auth_password: "REPLACE_WITH_SMTP_PASSWORD"

route:
  receiver: default-webhook
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: critical-email
      continue: true

receivers:
  - name: default-webhook
    webhook_configs:
      - url: "WEBHOOK_URL"
        send_resolved: true

  - name: critical-email
    email_configs:
      - to: "EMAIL_TO"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname", "service"]
