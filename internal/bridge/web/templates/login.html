{{define "content"}}
<section class="max-w-sm mx-auto bg-white p-6 rounded-lg shadow-sm border border-slate-200 space-y-4">
  <h1 class="text-xl font-semibold">Entrar</h1>
  {{if .Error}}<p class="text-sm text-red-600">{{.Error}}</p>{{end}}
  <form method="post" action="/login" class="space-y-3">
    <label class="block">
      <span class="text-sm text-slate-700">E-mail</span>
      <input type="email" name="email" required autocomplete="username"
             class="mt-1 w-full border border-slate-300 rounded px-3 py-2">
    </label>
    <label class="block">
      <span class="text-sm text-slate-700">Senha</span>
      <input type="password" name="password" required autocomplete="current-password"
             class="mt-1 w-full border border-slate-300 rounded px-3 py-2">
    </label>
    <button type="submit"
            class="w-full bg-slate-900 text-white rounded py-2 hover:bg-slate-800">
      Entrar
    </button>
  </form>
</section>
{{end}}
