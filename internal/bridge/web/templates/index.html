{{define "content"}}
<section class="space-y-4">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold">Painel</h1>
    <a href="/tenants/new" class="bg-slate-900 text-white px-4 py-2 rounded text-sm hover:bg-slate-800">+ Novo tenant</a>
  </div>
  {{if .Data}}
  <table class="w-full text-sm bg-white border border-slate-200 rounded overflow-hidden">
    <thead class="bg-slate-100">
      <tr><th class="text-left px-3 py-2">Slug</th><th class="text-right px-3 py-2">Mensagens (24h)</th><th class="px-3 py-2"></th></tr>
    </thead>
    <tbody>
    {{range .Data}}
      <tr class="border-t">
        <td class="px-3 py-2 font-mono">{{.Slug}}</td>
        <td class="px-3 py-2 text-right">{{.Count24h}}</td>
        <td class="px-3 py-2 text-right text-xs">
          <a href="/tenants/{{.Slug}}/diag" class="text-slate-600 hover:underline">diagnóstico</a>
        </td>
      </tr>
    {{end}}
    </tbody>
  </table>
  {{else}}
  <p class="text-slate-600">Nenhum tenant cadastrado. <a href="/tenants/new" class="text-slate-900 underline">Criar agora</a>.</p>
  {{end}}
</section>
{{end}}
